<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>E-Shop Landing</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- Navbar loaded dynamically -->
    <div id="navbar-container"></div>

    <div class="container text-center mt-5">
        <h1>Welcome to E-Shop</h1>
        <p>Choose your path:</p>
        <a href="pages/auth/login.html" class="btn btn-primary m-2">Login</a>
        <a href="pages/auth/register.html" class="btn btn-secondary m-2">Register</a>
        <a href="pages/shop/home.html" class="btn btn-success m-2">Browse as Guest</a>
    </div>

    <!-- Footer loaded dynamically -->
    <div id="footer-container"></div>

    <!-- Core JS -->
    <script type="module" src="js/core/include.js"></script>

    <!-- Optional: redirect script -->
    <script type="module">
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (user?.role === "admin") window.location.href = "pages/admin/admin-panel.html";
        else if (user?.role === "seller") window.location.href = "pages/seller/seller-dashboard.html";
        else if (user?.role === "customer") window.location.href = "pages/shop/home.html";
    </script>

</body>

</html>

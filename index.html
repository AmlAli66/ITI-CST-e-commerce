<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>E-Shop Landing</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
        }
        .snowflake {
            
            position: fixed;
            top: -10px;
            color: rgb(119, 238, 238);
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            opacity: 1;  /* Make it more subtle - 0.6 means 60% visible */
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);  /* Move down the full screen height */
            }
        }
        .content {
            color: white;
            text-align: center;
            padding: 50px;
        }
    </style>
    <script>
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            snowflake.innerHTML = '❅';
            snowflake.style.left = Math.random() * window.innerWidth + 'px';
            snowflake.style.animationDuration = (Math.random() * 5 + 5) + 's';
            
            // Optional: Vary the opacity for each snowflake (between 30% and 70%)
            snowflake.style.opacity = Math.random() * 0.4 + 0.3;
            
            document.body.appendChild(snowflake);           
            setTimeout(() => {
                snowflake.remove();
            }, 10000);
        }
        // Start snow automatically when page loads
        setInterval(createSnowflake, 800);
    </script>
</head>

<body>

    <!-- Navbar loaded dynamically -->
    <div id="navbar-container"></div>

    <div class="container text-center min-vh-100 mt-5">
        <h1>Welcome to <i class="fa-solid fa-snowflake text-info "></i><span >IceMart</span></h1>
    </div>
    </div>










    
    <!-- Footer loaded dynamically -->
    <div id="footer-container"></div>

    <!-- Core JS -->
    <script type="module" src="js/core/include.js"></script>

    <!-- Optional: redirect script -->
    <script type="module">
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (user?.role === "admin") window.location.href = "pages/admin/admin-panel.html";
        else if (user?.role === "seller") window.location.href = "pages/seller/seller-dashboard.html";
        else if (user?.role === "customer") window.location.href = "pages/shop/home.html";
    </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    </body>

</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password - Ice Mart</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

    <!-- Global CSS -->
    <link rel="stylesheet" href="../../css/main.css" />
    <!-- Page CSS -->
    <link rel="stylesheet" href="/css/pages/forgot-password.css" />
  </head>

  <body>
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px">
        <h3 class="text-center mb-4">Reset Password</h3>

        <!-- Step 1: Request Reset -->
        <div id="step1">
          <p class="text-muted text-center mb-4">
            Enter your email address and we'll send you a code to reset your
            password.
          </p>

          <form id="forgotPasswordForm">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="resetEmail"
                placeholder="Enter your email"
                required
              />
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100"
              id="sendCodeBtn"
            >
              <span id="btnText">Send Reset Code</span>
              <span
                id="btnSpinner"
                class="spinner-border spinner-border-sm d-none"
              ></span>
            </button>

            <div id="error" class="text-danger text-center mt-3"></div>
            <div id="success" class="text-success text-center mt-3"></div>
          </form>
        </div>

        <!-- Step 2: Verify Code (hidden initially) -->
        <div id="step2" class="d-none">
          <p class="text-muted text-center mb-4">
            Enter the 6-digit code sent to your email.
          </p>

          <form id="verifyCodeForm">
            <div class="mb-3">
              <label class="form-label">Verification Code</label>
              <input
                type="text"
                class="form-control"
                id="verificationCode"
                placeholder="Enter 6-digit code"
                maxlength="6"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Verify Code
            </button>
            <div id="error2" class="text-danger text-center mt-3"></div>
            <div id="success2" class="text-success text-center mt-3"></div>
            <div class="text-center mt-3">
              <small>
                Didn't receive code?
                <a href="#" id="resendCode">Resend</a>
              </small>
            </div>
          </form>
        </div>

        <!-- Step 3: New Password (hidden initially) -->
        <div id="step3" class="d-none">
          <p class="text-muted text-center mb-4">Enter your new password.</p>

          <form id="newPasswordForm">
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input
                type="password"
                class="form-control"
                id="newPassword"
                placeholder="Enter new password"
                required
                minlength="6"
              />
              <small class="text-muted">Minimum 6 characters</small>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                placeholder="Confirm new password"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Reset Password
            </button>
            <div id="error3" class="text-danger text-center mt-3"></div>
            <div id="success3" class="text-success text-center mt-3"></div>
          </form>
        </div>

        <!-- Back to Login -->
        <div class="text-center mt-3">
          <small>
            <a href="login.html" class="text-decoration-none"
              >← Back to Login</a
            >
          </small>
        </div>
      </div>
    </div>
    <script src="../../js/modules/auth/forgot-password.js"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"
    ></script>
  </body>
</html>

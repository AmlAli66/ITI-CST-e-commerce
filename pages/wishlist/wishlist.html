<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Wishlist</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../../css/pages/wishlist.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Shared Navbar -->
    <div id="navbar-container"></div>

    <!-- Breadcrumb -->
    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
                <li class="breadcrumb-item active">My Wishlist</li>
            </ol>
        </nav>
    </div>

    <div class="container mt-4">
        <h2 class="mb-4">
            <i class="fas fa-heart text-danger me-2"></i>
            My Wishlist
        </h2>

        <div class="row">
            <div class="col-lg-12">
                <!-- Wishlist Items -->
                <div id="wishlistItems"></div>
                
                <!-- Wishlist Actions -->
                <div class="cart-actions">
                    <a href="/pages/shop/catalog.html" class="btn-continue">
                        <i class="fas fa-arrow-left me-2"></i>
                        Continue Shopping
                    </a>
                    <button class="btn-clear" onclick="clearWishlist()">
                        <i class="fas fa-trash me-2"></i>
                        Clear Wishlist
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-simple" id="toastMessage">
        <i class="fas fa-check-circle" id="toastIcon"></i>
        <span id="toastText">Product added to wishlist</span>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-trash-alt text-danger me-2"></i>
                        Confirm Deletion
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-0">Are you sure you want to remove this item from your wishlist?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>Cancel
                    </button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                        <i class="fas fa-trash me-2"></i>Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Required Modal -->
    <div class="modal fade" id="loginRequiredModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                        Login Required
                    </h5>
                </div>
                <div class="modal-body text-center">
                    <div class="modal-icon-wrapper mb-3">
                        <i class="fas fa-user-lock text-warning" style="font-size: 3.5rem;"></i>
                    </div>
                    <p class="mb-2 fw-bold">You need to login first!</p>
                    <p class="text-muted mb-0">Please login to view your wishlist.</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-primary btn-lg px-5" onclick="window.location.href='/pages/auth/login.html'">
                        <i class="fas fa-sign-in-alt me-2"></i>Login Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared Footer -->
    <div id="footer-container"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Core Scripts -->
    <script src="../../js/core/include.js"></script>

    <!-- Wishlist Module -->
    <script src="../../js/modules/wishlist/wishlist.js"></script>
</body>
</html>

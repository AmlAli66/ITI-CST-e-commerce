<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Seller Dashboard | Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/pages/seller.css">
</head>

<body class="bg-light">

    <!-- <div id="navbar-container"></div> -->

    <div class="container-fluid overflow-hidden">
        <div class="row min-vh-100 px-2">

            <div class="col-12 col-md-3 col-lg-2  d-flex flex-column position-relative">
                <aside class="seller-sidebar d-flex flex-column">

                    <div class="sidebar-header px-4 py-4">
                        <div class="d-flex align-items-center gap-2">
                            <div class="logo-circle">
                                <i class="bi bi-shop"></i>
                            </div>
                            <div>
                                <h6 class="m-0 fw-bold ">Seller Panel</h6>
                                <small class="text-muted">Analytics</small>
                            </div>
                        </div>
                    </div>

                    <ul class="nav flex-column px-3 mt-3 gap-1">

                        <li class="nav-item">
                            <a class="nav-link active" data-section="overview">
                                <i class="bi bi-grid-1x2"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" data-section="products">
                                <i class="bi bi-box-seam"></i>
                                <span>Products</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link d-flex justify-content-between align-items-center" data-section="orders">
                                <span class="d-flex align-items-center gap-2">
                                    <i class="bi bi-cart3"></i>
                                    Orders
                                </span>
                                <span class="badge bg-danger rounded-pill d-none" id="pendingBadge">0</span>
                            </a>
                        </li>

                    </ul>

                </aside>

            </div>

            <main class="col-12 col-md-9 col-lg-10 p-lg-5 p-md-4 p-3 overflow-y-auto">

                <section id="overviewSection" class="fade-in">
                    <header class="mb-5">
                        <h2 class="fw-bold text-dark mb-1">Dashboard Overview</h2>
                        <p class="text-muted">Welcome back! Here's what's happening today.</p>
                    </header>

                    <div class="row g-4" id="statsCards"></div>

                    <div class="row mt-4 g-4">
                        <div class="col-xl-4 col-md-6">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body d-flex flex-column justify-content-center p-4"
                                    id="topProductWidget">
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-8 col-md-12">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-header bg-white border-0 pt-4 px-4">
                                    <h5 class="fw-bold m-0">Revenue Analytics</h5>
                                </div>
                                <div class="card-body p-4 d-flex flex-column">
                                    <div class="chart-container" style="position: relative; height:300px; width:100%">
                                        <canvas id="salesChart"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="productsSection" class="d-none fade-in">
                    <div
                        class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4">
                        <h2 class="fw-bold m-0">My Products</h2>
                        <button class="btn main-btn text-light px-4 py-2 rounded-3 shadow-sm" data-bs-toggle="modal"
                            data-bs-target="#addProductModal">
                            <i class="bi bi-plus-circle"></i> Add New Product
                        </button>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-0">
                            <div class="p-3 border-bottom">
                                <div class="input-group search-group mx-auto">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="bi bi-search"></i></span>
                                    <input type="text" id="productSearch" class="form-control border-start-0 ps-0"
                                        placeholder="Search by name...">
                                </div>
                            </div>
                            <div class="table-responsive" id="productsTable"></div>
                        </div>
                    </div>
                </section>

                <section id="ordersSection" class="d-none fade-in">
                    <h2 class="fw-bold mb-4">Order Management</h2>
                    <div class="card border-0 shadow-sm ">
                        <div class="card-body p-0">
                            <div class="table-responsive" id="ordersTable"></div>
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <div class="modal fade" id="addProductModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold"> Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addProductForm">

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Product Name</label>
                            <input type="text" class="form-control bg-light border-0 py-2" id="productName" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Description</label>
                            <textarea class="form-control bg-light border-0 py-2" id="productDescription" rows="3"
                                required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-4 mb-2">
                                <label class="form-label small fw-bold text-muted">Price</label>
                                <input type="number" class="form-control bg-light border-0 py-2" id="productPrice"
                                    required>
                            </div>

                            <div class="col-4 mb-2">
                                <label class="form-label small fw-bold text-muted">Discount %</label>
                                <input type="number" class="form-control bg-light border-0 py-2" id="productDiscount"
                                    value="0">
                            </div>

                            <div class="col-4 mb-2">
                                <label class="form-label small fw-bold text-muted">Stock</label>
                                <input type="number" class="form-control bg-light border-0 py-2" id="productStock"
                                    required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-2">
                                <label class="form-label small fw-bold text-muted">Category</label>
                                <input type="text" class="form-control bg-light border-0 py-2" id="productCategory">
                            </div>

                            <div class="col-6 mb-2">
                                <label class="form-label small fw-bold text-muted">Brand</label>
                                <input type="text" class="form-control bg-light border-0 py-2" id="productBrand">
                            </div>
                        </div>

                        <div class="row">
                            <div class="mb-2 col-12">
                                <label class="form-label small fw-bold text-muted">Main Image</label>
                                <input type="file" class="form-control bg-light border-0 py-2" id="productImage"
                                    accept="image/*">
                            </div>

                            <div class="mb-3 col-12">
                                <label class="form-label small fw-bold text-muted">Gallery Images</label>
                                <input type="file" class="form-control bg-light border-0 py-2" id="productGallery"
                                    accept="image/*" multiple>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            Save Product
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-4">
                    <div class="text-danger mb-3"><i class="bi bi-exclamation-octagon" style="font-size: 3rem;"></i>
                    </div>
                    <h5 class="fw-bold">Delete Product?</h5>
                    <p class="text-muted small">This action cannot be undone.</p>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-light flex-grow-1" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger flex-grow-1" id="confirmDeleteBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="orderDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Order Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="orderDetailsBody"></div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-bg-primary border-0 shadow" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">Success!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- <script src="../../js/core/include.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../../js/modules/seller/seller-dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

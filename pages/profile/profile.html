<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../../css/pages/profile.css">
    <!----------------------------------------------------->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Inter - Super clean and professional -->
<!-- Orbitron - Sci-fi style -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"><!-- Outfit - Modern and clean (perfect for winter theme) -->
<!-- Righteous - Retro and chunky -->
<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
<!-- Quicksand - Soft and rounded -->
<!-- Bebas Neue - VERY bold and tall -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

    <!-- Shared Navbar -->
    <div id="navbar-container"></div>
    <div class="container-fluid vh-100">
        <div class="profileHeader">
            <div class="profileAvatarWrapper">
                <div class="profileAvatar" id="profileAvatar">
                    FR
                </div>
                <div class="profileAvatarStatus">

                </div>
            </div><!---------- end of avatar wrapper-->
            <div>
                <h1 class="profileUserName" id="profileUserName"></h1>
                <div class="profileEmail" id="profileEmail">

                </div>
                <div class="profileBadges">
                    <span class="profileRole" id="profileRole"></span>
                    <span class="profileCreatedAt" id="profileCreatedAt"></span>
                    <span class="profileStatus" id="profileStatus"></span>
                </div>
            </div><!-------------end of profile info-->
            <button class="profileEditBTN"  onclick="openEditModal()"> <i class="fas fa-pen"></i> Edit Profile</button>

        </div><!--------end of header-->
        <div class="profilePersionalInfo">
            <div class="profileInfoHeader">
                <h3><i class="fas fa-user"></i> Personal Information</h3>
                <a href="#" onclick="openEditModal()">Edit </a>
            </div>
            <div class="profileInfoGrid">
                <div class="profileInfoItem">
                    <span class="profileInfoLabel">Name</span>
                    <span class="profileInfoValue" id="profileInfoName"></span>
                </div>
                <div class="profileInfoItem">
                    <span class="profileInfoLabel">Email</span>
                    <span class="profileInfoValue" id="profileInfoEmail"></span>
                </div>
                <div class="profileInfoItem">
                    <span class="profileInfoLabel">Phone</span>
                    <span class="profileInfoValue" id="profileInfoPhone"></span>
                </div>
                <div class="profileInfoItem">
                    <span class="profileInfoLabel">Date Joined</span>
                    <span class="profileInfoValue" id="profileInfoDate"></span>
                </div>
                <div class="profileInfoItem profileInfoFull">
                    <span class="profileInfoLabel">Address</span>
                    <span class="profileInfoValue" id="profileInfoAddress"></span>
                </div>
            </div>
            <!-------------------------The Modal of Edit-->
                <div class="modal fade" id="editProfileModal">
    <div class="modal-dialog">
        <div class="modal-content" style="background: #0d1526; color: #e8edf5; border: 1px solid rgba(56, 189, 248, 0.08);">
            <div class="modal-header" style="border-bottom: 1px solid rgba(56, 189, 248, 0.08);">
                <h5><i class="fas fa-pen" style="color: #38bdf8;"></i> Edit Profile</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="profileInfoLabel">Name</label>
                <input type="text" class="form-control mb-3" id="editName" required minlength="3" style="background: #0a1120; color: #e8edf5; border-color: rgba(56, 189, 248, 0.15);">
                
                <label class="profileInfoLabel">Phone</label>
                <input type="text" class="form-control mb-3" id="editPhone"  required minlength="10" style="background: #0a1120; color: #e8edf5; border-color: rgba(56, 189, 248, 0.15);">
                
                <label class="profileInfoLabel">Address</label>
                <input type="text" class="form-control mb-3" id="editAddress"required style="background: #0a1120; color: #e8edf5; border-color: rgba(56, 189, 248, 0.15);">
            </div>
            <div class="modal-footer" style="border-top: 1px solid rgba(56, 189, 248, 0.08);">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn" style="background: #38bdf8; color: #020617; font-weight: 600;" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>
</div>


            <!------------------------------------------------>
        </div><!---------end of Peraonsl Info-------->
        
    </div>












    <!-- Shared Footer -->
    <div id="footer-container"></div>

    <!-- Core Scripts -->
    <script src="../../js/core/include.js"></script>
    <script src="../../js/core/utils.js"></script>
    <script src="../../js/core/storage.js"></script>

    <!-- Page Module -->
    <script src="../../js/modules/profile/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    </body>
</body>

</html>

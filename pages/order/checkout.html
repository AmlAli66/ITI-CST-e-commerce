<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../../css/pages/checkout.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


</head>

<body>

    <!-- Shared Navbar -->
    <div id="navbar-container"></div>

    <!-- Page Content -->


    <div class="container checkout-container mb-4">
        <nav aria-label="breadcrumb ">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
                <li class="breadcrumb-item active ">Secure Checkout</li>
            </ol>
        </nav>
   
      
    <div class="row">

     
        <!-- LEFT SIDE - 8 COL -->
        <div class="col-lg-8">

            <h2 class="mb-4 mt-5">
                <i class="fas fa-shopping-cart text-primary me-2"></i>
                Checkout
            </h2>
    
    
           
            
                <div class="row ">
                    <div class="free-shipping-badge" id="shippingProgress">
                        <i class="fas fa-truck text-success"></i>
                        <span class="text-success">Who will recieve this order? </span>
                    </div>
                  
                    <div class="col-md-6 mb-3 " >
                      

                        <label class="form-label"><i class="fa-regular fa-id-badge text-info"></i><b> Full Name</b></label>
                        <input type="text" class="form-control" id="fullName">
                        <div class="invalid-feedback">Invalid name</div>
                    </div>
            
                    <div class="col-md-6 mb-3">
                        <label class="form-label"><i class="fa-solid fa-phone text-primary"></i><b> Phone Number</b></label>
                        <input type="text" class="form-control" id="phone">
                        <div class="invalid-feedback">Invalid phone number</div>
                    </div>
                </div>
            
                <div class="mb-3">
                    <label class="form-label"><i class="fa-solid fa-location-dot text-warning"></i><b> Address</b></label>
                    <textarea class="form-control" id="address" rows="3"></textarea>
                    <div class="invalid-feedback">Address is required</div>
                </div>
            <!-- </div> -->


            <!-- Payment Method -->
            <div class="card p-4 shadow-sm mb-3  ">
                <h5 class="mb-3"><b>Pay With</b></h5>
            
                <div class="form-check mb-3 bg-light p-3 rounded">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="cod" checked>
                    <label class="form-check-label"><i class="fa-solid fa-money-bill-wave text-success me-2"></i> Cash on Delivery</label>
                </div>
            
                <div class="form-check mb-3 bg-light p-3 rounded">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="visa">
                    <label class="form-check-label"> <i class="fab fa-cc-visa"></i> Visa </label>
                </div>

                <div class="form-check mb-3 bg-light p-3 rounded">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="MasterCard">
                    <label class="form-check-label">   <i class="fab fa-cc-mastercard"></i>  MasterCard</label>
                </div>
            
            
                <!-- Visa Details -->
                <div id="visaDetails" class="d-none mb-3">
            
                    <div class="mb-3">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" id="cardNumber">
                    </div>
            
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Expiry</label>
                            <input type="text" class="form-control" placeholder="MM/YY" id="expiry">
                        </div>
            
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cvv">
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="col-lg-4 mb-5 ">
            
             <div class="card p-4 mb-2 shadow-sm  ">
                 <h5 class="mb-3"><h3>Order Summary</h3></h5>
                 <ul id="orderList" class="list-group mb-3"></ul>
             
          

                 <div class="d-flex justify-content-between">
                    <strong>Subtotal:</strong>
                    <span id="subTotal">$0</span>
                </div>
                <div class="d-flex justify-content-between">
                    <strong>Shipping:</strong>
                    <span id="shipping">$10</span>
                </div>
                <div class="d-flex justify-content-between">
                    <strong>Tax:</strong>
                    <span id="tax">$0</span>
                </div>
                <div class="d-flex justify-content-between total-row">
                    <strong>Total:</strong>
                    <span id="total">$0</span>
                </div>
             
                <button type="button" class="btn btn-primary w-100 mt-3" id="placeOrder">
                    Place Order
                </button>

                    <!-- Payment Methods -->
                    <div class="payment-methods">
                        <small>Secure Payment with</small>
                        <div class="payment-icons">
                            <i class="fab fa-cc-visa"></i>
                            <i class="fab fa-cc-mastercard"></i>
                            <i class="fab fa-cc-paypal"></i>
                            <!-- <i class="fab fa-cc-amex"></i> -->
                        </div>
                    </div>

                    <!-- Trust Badges -->
                    <div class="trust-badges">
                        <div class="trust-badge ">
                            <i class="fas fa-shield-alt text-success"></i>
                            <span>Secure</span>
                        </div>
                        <div class="trust-badge">
                            <i class="fas fa-lock text-success"></i>
                            <span>Encrypted</span>
                        </div>
                        <!-- <div class="trust-badge">
                            <i class="fas fa-undo text-success"></i>
                            <span>30 Days Return</span>
                        </div> -->
                    </div>
            </div> 

        </div>
    
   
       </div>

  </div>
 
</div>


    <!-- Shared Footer -->
    <div id="footer-container"></div>

    <!-- Core Scripts -->
    <script src="../../js/core/include.js"></script>
    <!-- <script src="../../js/core/utils.js"></script> -->
    <!-- <script src="../../js/core/storage.js"></script> -->

    <!-- Page Module -->
    <script src="../../js/modules/checkout/checkout.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

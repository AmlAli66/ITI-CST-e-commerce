<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!--Font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../../css/pages/admin.css">
</head>

<body>

    <!-- Page Content -->
    <button id="mobileMenuToggle" class="mobile-menu-toggle d-lg-none">
        <i class="bi bi-list"></i>
    </button>

    <div class="dashboard-container">
        <aside id="sidebar" class="dashboard-sidebar text-capitalize">
            <div class="sidebar-overlay d-lg-none" id="sidebarOverlay"></div>

            <div class="sidebar-content">
                <div class="sidebar-header">
                    <div class="d-flex justify-content-between align-items-center">
                        <button id="backBtn" class="back-btn">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        <button class="btn text-white d-lg-none" id="closeSidebar">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>

                    <div class="sidebar-brand">
                        <div class="logo-circle">
                            <i class="bi bi-shield-lock"></i>
                        </div>
                        <div>
                            <h6 class="mb-0">Admin Panel</h6>
                            <small class="text-muted">System Control</small>
                        </div>
                    </div>
                </div>
                <ul class="sidebar-menu">
                    <li data-section="dashboard" class="active">
                        <i class="bi bi-speedometer2"></i>
                        <span>Dashboard</span>
                    </li>

                    <li data-section="users">
                        <i class="bi bi-people"></i>
                        <span>Users</span>
                        <span id="usersCountBadge" class="users-badge">0</span>
                    </li>

                    <li data-section="products">
                        <i class="bi bi-box-seam"></i>
                        <span>Products</span>
                    </li>

                    <li data-section="orders">
                        <i class="bi bi-cart3"></i>
                        <span>Orders</span>
                    </li>
                </ul>
                <div class="sidebar-footer">
                    <button id="logoutBtn" class="logout-btn">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="dashboard-main">
            <section id="adminDashboard"></section>
            <section id="adminUsers" class="hidden"></section>
            <section id="adminProducts" class="hidden"></section>

        </main>
    </div>







    <!-- View User Modal  -->
    <div class="modal fade" id="viewUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 shadow-lg border-0">
                <div class="modal-header bg-gradient-primary text-white">
                    <h5 class="modal-title" id="viewUserTitle">
                        <i class="bi bi-person-circle me-2"></i>User Details
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="d-flex flex-column flex-md-row gap-4">
                        <!-- Avatar -->
                        <div class="user-avatar text-center">
                            <div class="avatar-circle mb-2">
                                <i class="bi bi-person-fill fs-2 text-white"></i>
                            </div>
                            <small class="text-muted">Role: <span id="userRoleBadge" class="fw-bold"></span></small>
                        </div>

                        <!-- User Info Section -->
                        <div class="user-info flex-grow-1 border-end pe-3">
                            <h6 class="mb-3 text-primary">User Information</h6>
                            <div class="info-row mb-2">
                                <i class="bi bi-person me-2 text-primary"></i>
                                <span id="viewUserName"></span>
                            </div>
                            <div class="info-row mb-2">
                                <i class="bi bi-envelope me-2 text-success"></i>
                                <span id="viewUserEmail"></span>
                            </div>
                            <div class="info-row mb-2">
                                <i class="bi bi-telephone me-2 text-info"></i>
                                <span id="viewUserPhone"></span>
                            </div>
                            <div class="info-row mb-2">
                                <i class="bi bi-geo-alt me-2 text-warning"></i>
                                <span id="viewUserAddress"></span>
                            </div>
                            <div class="info-row mb-2">
                                <i class="bi bi-calendar2-check me-2 text-secondary"></i>
                                <span id="viewUserDate"></span>
                            </div>
                            <div class="info-row mb-2" id="viewUserStoreRow">
                                <i class="bi bi-shop me-2 text-dark"></i>
                                <span id="viewUserStore"></span>
                            </div>
                        </div>

                        <!-- Admin Controls Section -->
                        <div class="admin-controls flex-grow-1 ps-3">
                            <h6 class="mb-3 text-warning">Admin Controls</h6>

                            <div class="d-flex align-items-center gap-3 mb-3">
                                <label class="form-check-label fw-bold" for="modalStatusToggle">Status:</label>
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input" type="checkbox" id="modalStatusToggle">
                                </div>
                                <span id="modalStatusText" class="fw-bold"></span>
                            </div>

                            <div class="last-reset-section p-3 border rounded-3 mb-2 bg-light">
                                <h6 class="mb-1 text-danger"><i class="bi bi-clock-history me-1"></i>Last Password Reset
                                </h6>
                                <span id="viewUserLastReset">Never</span>
                                <button id="modalResetPasswordBtn" class="btn btn-warning btn-sm mt-2 w-100">
                                    <i class="bi bi-key"></i> Reset Password
                                </button>
                            </div>

                            <div id="modalNewPasswordBox" class="alert alert-dark d-none mt-2 text-center"></div>
                        </div>


                    </div>
                </div>
                <div class="modal-footer justify-content-end border-0">
                    <button type="button" class="btn btn-secondary btn-sm px-4" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>



    <!-- Delete confirmation modal  -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
                    <h5 class="mt-3">Are you sure?</h5>
                    <p class="text-muted">This action cannot be undone.</p>
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset confirmation modal -->
    <div class="modal fade" id="resetModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-key text-warning fs-1"></i>
                    <h5 class="mt-3">Reset User Password?</h5>
                    <p class="text-muted">
                        A new temporary password will be generated.
                    </p>

                    <div id="newPasswordBox" class="alert alert-dark d-none mt-3"></div>

                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button id="confirmResetBtn" class="btn btn-warning">
                            Confirm Reset
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>







    <script type="module" src="../../js/core/include.js"></script>

    <!-- Page Module -->
    <script type="module" src="../../js/modules/admin/admin-panel.js"></script>

    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- chart js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!--Font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../../css/pages/admin.css">
</head>

<body>

    <!-- Shared Navbar -->
    <!-- <div id="navbar-container"></div> -->

    <!-- Page Content -->

    <div class="container-fluid">
        <!-- <h2>Admin Panel</h2> -->
        <div class="row min-vh-100 px-2">
            <div class="col-12 col-md-3 col-lg-2 d-flex flex-column">
                <aside class="admin-sidebar d-flex flex-column">

                    <div class="sidebar-header px-4 py-4">
                        <div class="d-flex align-items-center gap-2">
                            <div class="logo-circle">
                                <i class="bi bi-shield-lock"></i>
                            </div>
                            <div>
                                <h6 class="m-0 fw-bold">Admin Panel</h6>
                                <small class="text-muted">System Control</small>
                            </div>
                        </div>
                    </div>

                    <ul class="nav flex-column px-3 mt-3 gap-1">

                        <li class="nav-item">
                            <a class="nav-link active" data-section="overview">
                                <i class="bi bi-speedometer2"></i>
                                Overview
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" data-section="users">
                                <i class="bi bi-people"></i>
                                Users
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" data-section="products">
                                <i class="bi bi-box-seam"></i>
                                Products
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" data-section="orders">
                                <i class="bi bi-cart-check"></i>
                                Orders
                            </a>
                        </li>

                    </ul>
                </aside>
            </div>
            <div class="col-12 col-md-9 col-lg-10">
                <div id="admin-content" class="p-4 ">
                    <div id="admin-section-container"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- Shared Footer -->
    <div id="footer-container"></div>


    <!-- add modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="newUserName" class="form-control mb-2" placeholder="Name">
                    <input type="email" id="newUserEmail" class="form-control mb-2" placeholder="Email">
                    <select id="newUserRole" class="form-select">
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger" id="saveUserBtn">Save</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editUserId">
                    <input type="text" id="editUserName" class="form-control mb-2">
                    <input type="email" id="editUserEmail" class="form-control mb-2">
                    <select id="editUserRole" class="form-select">
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger" id="updateUserBtn">Update</button>
                </div>
            </div>
        </div>
    </div>



    <!-- Page Module -->
    <script src="../../js/modules/admin/admin-panel.js"></script>
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- chart js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>

</html>

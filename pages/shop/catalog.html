<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Catalog</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../../css/pages/catalog.css">
    <!----------------------------------------------------->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Inter - Super clean and professional -->
<!-- Orbitron - Sci-fi style -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"><!-- Outfit - Modern and clean (perfect for winter theme) -->
<!-- Righteous - Retro and chunky -->
<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
<!-- Quicksand - Soft and rounded -->
<!-- Bebas Neue - VERY bold and tall -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

    <!-- Shared Navbar -->
    <div id="navbar-container"></div>

    <div class="catalogfirstAnkers">
            
            <p><a href="/index.html" class="text-decoration-none text-dark">Home</a> > <a class="text-decoration-none text-dark"> Products</a></p>
        
        
        </div>
    </div>
    <div class="catalogSearchContainer">
        <span>Search </span><input type="search" class="catalogSearchBar" id="catalogSearchBar">
    </div>
    <div class="catalogContainer">
        <div class="catalogFilters">
            <div class="catalogFiltersWrapper">
                <div class="catalogClearAllFilters">
                    <button id="catalogClearAllFilters">Clear All Filters</button>
                </div>
                <div class="catalogFilterPrice">
                    <h5>Price Range</h5>
                    <div class="price-inputs">
                        <span>Min : $<span id="catalogMinPrice">0</span></span> -
                        <span> Max :$<span id="catalogMaxPrice">100000</span></span>
                    </div>
                    <input type="range" id="priceMin" min="0" max="100" value="0"><br>
                    <input type="range" id="priceMax" min="0" max="100" value="1000">
                </div>
                <h3>Categories</h3>
                    <div class="catalogCheckBoxWrapper">
                    <div class="catalogCheckBoxContainer">
                        <span class="catalogPointerFilter"><input type="checkbox" value="Fashion">Fashion <br></span>
                    </div>
                    <div class="catalogCheckBoxContainer">
                        <input type="checkbox" value="Mobiles">Mobiles <br>
                    </div>
                    <div class="catalogCheckBoxContainer">
                        <input type="checkbox" value="Home">Appliances <br>
                    </div>
                    <div class="catalogCheckBoxContainer">
                        <input type="checkbox" value="Electronics">Electronics <br>
                    </div>
                    <div class="catalogCheckBoxContainer">
                        <input type="checkbox" value="Beauty">Beauty <br>
                    </div>
                    </div>
                    </div><br>
            <div class="catalogFilterBrand" id="catalogFilterBrand">
                <h3 class="ps-3">Brands </h3>
                
            </div>

        </div>
        <!---- end of filters -->


        <div class="ProductsWrapper">    
            <!------Mobile button-->
            <div class="mobileClearFilter d-md-none">
                <button id="catalogClearAllFiltersMobile">
                    <i class="bi bi-x-circle"></i> Clear All Filters
                </button>
            </div>
            <!------------------------>
            <div class="catalogSortBar">
                <span>Sort By : </span>
                <select id="sortSelect">
                    <option value=""> Default</option>
                    <option value="price-low"> Low To High</option>
                    <option value="price-high"> Hight To Low </option>
                </select>
            </div> 
            <div class="catalogProducts row justify-content-center" id="catalogProducts">

        </div>
    </div>
    </div>






    <div id="catalogPagination" class="catalogPagination">
    </div>
    <div class="catalogCurrentNumberic">
        <span id="catalogCurrentNumberic"></span>
    </div>

    <!-- Shared Footer -->
    <div id="footer-container"></div>

    <!-- Core Scripts -->
    <script src="../../js/core/include.js"></script>
    <script src="../../js/core/utils.js"></script>
    <script src="../../js/core/storage.js"></script>

    <!-- Page Module -->
        <script src="../../js/modules/products/catalog.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
</body>

</html>
